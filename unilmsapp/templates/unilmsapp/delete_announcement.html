{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Delete Announcement</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">

     <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" />

    <!-- Custom CSS -->
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>

<body>
    <div class="container-fluid py-4">

        <div class="row justify-content-center">

            <div class="col-lg-7">

                <div class="card shadow-sm rounded-4 border-0">

                    <div class="card-body p-4">

                        <!-- HEADER -->
                        <div class="text-center mb-4">

                            <div class="bg-danger text-white rounded-circle d-inline-flex justify-content-center align-items-center mb-3"
                                style="width: 70px; height: 70px;">

                                <i class="fa-solid fa-trash fs-3"></i>

                            </div>

                            <h3 class="fw-bold text-danger">
                                Delete Announcement
                            </h3>

                            <p class="text-muted">
                                Are you sure you want to delete this announcement?
                            </p>

                        </div>

                        <hr>

                        <!-- ANNOUNCEMENT DETAILS -->
                        <div class="mb-3">

                            <label class="fw-semibold">
                                Title
                            </label>

                            <div class="form-control rounded-3 p-3 bg-light">
                                {{ announcement.title }}
                            </div>

                        </div>

                        <div class="mb-3">

                            <label class="fw-semibold">
                                Subject
                            </label>

                            <div class="form-control rounded-3 p-3 bg-light">
                                {{ announcement.subject.sub_name }}
                            </div>

                        </div>

                        <div class="mb-4">

                            <label class="fw-semibold">
                                Content
                            </label>

                            <div class="form-control rounded-3 p-3 bg-light" style="min-height: 120px;">

                                {{ announcement.content }}

                            </div>

                        </div>

                        <!-- BUTTONS -->
                        <form method="POST">

                            {% csrf_token %}

                            <div class="d-flex gap-2">

                                <button type="submit" class="btn btn-danger rounded-pill px-4">

                                    <i class="fa-solid fa-trash"></i>
                                    Delete

                                </button>

                                <a href="{% url 'announcements' %}" class="btn btn-light border rounded-pill px-4">

                                    Cancel

                                </a>

                            </div>

                        </form>

                    </div>

                </div>

            </div>

        </div>

    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
</body>

</html>
