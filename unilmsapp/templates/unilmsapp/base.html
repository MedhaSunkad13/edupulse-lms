{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Navbar{% endblock %}</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" />

    <!-- Custom CSS -->
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>

<body>

    <div class="d-flex">

        <!--  Sidebar -->
        <div class="sidebar p-3" style="width: 220px; height: 100vh; position: fixed; left: 0; top: 0;">

            <h4 class="text-center">EduPulse</h4>
            <p class="mb-3 text-center">A Learning Platform</p>

            <a href="{% url 'student_dashboard' %}"
                class="d-block mb-2 {% if request.resolver_match.url_name == 'student_dashboard' %}active{% endif %}">
                <i class="fa-solid fa-house me-2"></i> Dashboard
            </a>

            <a href="{% url 'my_courses' %}"
                class="{% if request.resolver_match.url_name == 'my_courses' %}active{% endif %} d-block mb-2">
                <i class="fa-solid fa-graduation-cap"></i> My Courses
            </a>

            <!-- <a href="#"
                class=" {% if request.resolver_match.url_name == 'my_courses' %}active{% endif %} d-block mb-2">
                <i class="fa-solid fa-clock me-2"></i> Lessons
            </a> -->

            <a href="{%url 'student_announcements' %}"
                class="{% if request.resolver_match.url_name == 'student_announcements' %}active{% endif %} d-block mb-2">
                <i class="fa-solid fa-bullhorn me-2"></i> Announcements
            </a>

            <a href="{% url 'student_events'%}"
                class="{% if request.resolver_match.url_name == 'student_events' %}active{% endif %} d-block mb-2">
                <i class="fa-solid fa-calendar me-2"></i> Events
            </a>

            <!-- SETTINGS SECTION -->
            <!-- SETTINGS -->
            <div class="mt-3">

                <!-- SETTINGS BUTTON -->
                <button class="btn w-100 text-start d-flex align-items-center" type="button" data-bs-toggle="collapse"
                    data-bs-target="#settingsMenu" aria-expanded="false" style="border: none; background: transparent;">

                    <h6 class=" mb-3 text-dark">

                        <i class="fa-solid fa-gear me-2"></i>
                        Settings

                    </h6>

                </button>

                <!-- COLLAPSIBLE MENU -->
                <div class="collapse mt-2" id="settingsMenu">

                    <!-- EDIT PROFILE -->
                    <a href="{% url 'edit_profile' %}" class="d-block text-decoration-none ps-4 mb-3">

                        <i class="fa-solid fa-user me-2"></i>
                        Edit Profile

                    </a>

                    <!-- CHANGE PASSWORD -->
                    <a href="{% url 'change_password' %}" class="d-block text-decoration-none ps-4 mb-3">

                        <i class="fa-solid fa-lock me-2"></i>
                        Change Password

                    </a>

                    <!-- LOGOUT -->
                    <a href="{% url 'profile_logout' %}" class="d-block text-decoration-none ps-4 text-danger">

                        <i class="fa-solid fa-right-from-bracket me-2"></i>
                        Logout

                    </a>

                </div>

            </div>

        </div>

        <!-- Main Content -->
        <div class="flex-grow-1" style="margin-left: 220px;">

            {% block content %}
            {% endblock %}

        </div>

    </div>

    <!-- Bootstrap JS-->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
