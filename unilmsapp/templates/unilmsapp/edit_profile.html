{% extends 'unilmsapp/base.html' %}
{% load static %}

{% block title %}Edit Profile{% endblock %}

{% block content %}

<div class="container-fluid py-4">

    <div class="row justify-content-center">

        <div class="col-lg-8">

            <!-- CARD -->
            <div class="card border-0 shadow rounded-4 p-4"
                 style="background-color: #fdfcff;">

                <!-- HEADER -->
                <h3 class="fw-bold text-center text-white rounded-4 py-3 mb-4"
                    style="background: linear-gradient(135deg, #6a5af9, #8b7bff);">

                    Edit Profile

                </h3>

                <form method="POST" enctype="multipart/form-data">

                    {% csrf_token %}

                    <!-- PROFILE IMAGE -->
                    <div class="text-center mb-4">

                        <img src="{{ curr_user.profile_img.url }}"
                             class="rounded-circle shadow border border-4 border-white"
                             width="120"
                             height="120"
                             style="object-fit: cover;">

                    </div>

                    <!-- EMAIL -->
                    <div class="mb-3">

                        <label class="form-label fw-semibold">
                            Email
                        </label>

                        <input type="email"
                               name="email"
                               class="form-control rounded-3"
                               style="background-color: #f8f5ff;"
                               value="{{ curr_user.email }}">

                    </div>

                    <!-- ADDRESS -->
                    <div class="mb-4">

                        <label class="form-label fw-semibold">
                            Address
                        </label>

                        <textarea name="address"
                                  class="form-control rounded-3"
                                  style="background-color: #f8f5ff;"
                                  rows="4">{{ curr_user.address }}</textarea>

                    </div>

                    <!-- PROFILE IMAGE -->
                    <div class="mb-4">

                        <label class="form-label fw-semibold">
                            Change Profile Image
                        </label>

                        <input type="file"
                               name="image"
                               class="form-control rounded-3"
                               style="background-color: #f8f5ff;">

                    </div>

                    <!-- BUTTON -->
                    <div class="text-center">

                        <button type="submit"
                                class="btn text-white rounded-pill px-5 py-2 fw-semibold"
                                style="background: linear-gradient(135deg, #6a5af9, #8b7bff);">

                            Save Changes

                        </button>

                    </div>

                </form>

            </div>

        </div>

    </div>

</div>

{% endblock %}
