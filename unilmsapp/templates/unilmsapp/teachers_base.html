{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>
        {% block title %}Teacher Dashboard{% endblock %}
    </title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Font Awesome -->
    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" />

    <!-- Custom CSS -->
    <link rel="stylesheet" href="{% static 'css/style.css' %}">

</head>

<body style="background-color: #f5f7fb;">

    <div class="d-flex">

        <!-- SIDEBAR -->
        <div class="sidebar text-white p-3"
             style="width: 240px;
                    height: 100vh;
                    position: fixed;
                    left: 0;
                    top: 0;
                    background: linear-gradient(180deg, #4e54c8, #8f94fb);
                    overflow-y: auto;">

            <!-- LOGO -->
            <div class="text-center mb-4">

                <h3 class="fw-bold">
                    EduPulse
                </h3>

                <p class="small">
                    Teacher Portal
                </p>

            </div>

            <!-- DASHBOARD -->
            <a href="{% url 'teachers_dashboard' %}"
               class="sidebar-link d-block mb-2 {% if request.resolver_match.url_name == 'teachers_dashboard' %}active{% endif %}">

                <i class="fa-solid fa-chart-line me-2"></i>
                Dashboard

            </a>

            <!-- MY SUBJECTS -->
            <a href="{% url 'teacher_subjects' %}"
               class="sidebar-link d-block mb-2">

                <i class="fa-solid fa-book me-2"></i>
                My Subjects

            </a>

            <!-- UPLOAD MATERIAL -->
            <a href="{% url 'upload_materials' %}"
               class="sidebar-link d-block mb-2">

                <i class="fa-solid fa-upload me-2"></i>
                Upload Material
            </a>

            <!-- ASSIGNMENTS -->
            <a href="{% url 'create_assignment' %}"
               class="sidebar-link d-block mb-2">

                <i class="fa-solid fa-file-circle-plus me-2"></i>
                Assignments

            </a>

            <!-- QUIZZES -->
            <a href="{% url 'create_quiz' %}"
               class="sidebar-link d-block mb-2">

                <i class="fa-solid fa-circle-question me-2"></i>
                Quizzes

            </a>

            <!-- SUBMISSIONS -->
            <!-- <a href="#"
               class="sidebar-link d-block mb-2">

                <i class="fa-solid fa-users me-2"></i>
                Student Submissions

            </a> -->

            <!-- ANNOUNCEMENTS -->
            <a href="{% url 'announcements' %}"
               class="sidebar-link d-block mb-2">

                <i class="fa-solid fa-bullhorn me-2"></i>
                Announcements

            </a>

            <!-- EVENTS -->
            <a href="{%url 'create_event' %}"
               class="sidebar-link d-block mb-3">

                <i class="fa-solid fa-calendar me-2"></i>
                Events

            </a>

            <!-- SETTINGS -->
            <div class="mt-3">

                <!-- SETTINGS BUTTON -->
                <button class="btn w-100 text-start text-white d-flex align-items-center"
                        type="button"
                        data-bs-toggle="collapse"
                        data-bs-target="#settingsMenu"
                        aria-expanded="false"
                        style="border: none;
                               background: rgba(255,255,255,0.1);
                               border-radius: 12px;">

                    <i class="fa-solid fa-gear me-2"></i>

                    Settings

                    <i class="fa-solid fa-chevron-down ms-auto"></i>

                </button>

                <!-- COLLAPSIBLE MENU -->
                <div class="collapse mt-3" id="settingsMenu">

                    <!-- EDIT PROFILE -->
                    <a href="{% url 'edit_profile' %}"
                       class="sidebar-submenu d-block text-decoration-none ps-4 mb-3">

                        <i class="fa-solid fa-user me-2"></i>
                        Edit Profile

                    </a>

                    <!-- CHANGE PASSWORD -->
                    <a href="{% url 'change_password' %}"
                       class="sidebar-submenu d-block text-decoration-none ps-4 mb-3">

                        <i class="fa-solid fa-lock me-2"></i>
                        Change Password

                    </a>

                    <!-- LOGOUT -->
                    <a href="{% url 'profile_logout' %}"
                       class="sidebar-submenu d-block text-decoration-none ps-4 text-warning">

                        <i class="fa-solid fa-right-from-bracket me-2"></i>
                        Logout

                    </a>

                </div>

            </div>

        </div>

        <!-- MAIN CONTENT -->
        <div class="flex-grow-1"
             style="margin-left: 240px;">

            {% block content %}
            {% endblock %}

        </div>

    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
