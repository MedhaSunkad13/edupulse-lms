{% extends 'unilmsapp/base.html' %}
{% load static %}

{% block title %}Change Password{% endblock %}

{% block content %}

<div class="container-fluid py-4">

    <div class="row justify-content-center">

        <div class="col-lg-6">

            <div class="card border-0 shadow rounded-4 p-4"
                 style="background-color: #fdfcff;">

                <!-- HEADER -->
                <h3 class="fw-bold text-center text-white rounded-4 py-3 mb-4"
                    style="background: linear-gradient(135deg, #6a5af9, #8b7bff);">

                    Change Password

                </h3>

                <!-- MESSAGES -->
                {% if messages %}

                    {% for message in messages %}

                        <div class="alert alert-{{ message.tags }}">

                            {{ message }}

                        </div>

                    {% endfor %}

                {% endif %}

                <form method="POST">

                    {% csrf_token %}

                    <!-- OLD PASSWORD -->
                    <div class="mb-3">

                        <label class="form-label fw-semibold">
                            Old Password
                        </label>

                        <input type="password"
                               name="old_password"
                               class="form-control rounded-3"
                               style="background-color: #f8f5ff;">

                    </div>

                    <!-- NEW PASSWORD -->
                    <div class="mb-3">

                        <label class="form-label fw-semibold">
                            New Password
                        </label>

                        <input type="password"
                               name="new_password"
                               class="form-control rounded-3"
                               style="background-color: #f8f5ff;">

                    </div>

                    <!-- CONFIRM PASSWORD -->
                    <div class="mb-4">

                        <label class="form-label fw-semibold">
                            Confirm Password
                        </label>

                        <input type="password"
                               name="confirm_password"
                               class="form-control rounded-3"
                               style="background-color: #f8f5ff;">

                    </div>

                    <!-- BUTTON -->
                    <div class="text-center">

                        <button type="submit"
                                class="btn text-white rounded-pill px-5 py-2 fw-semibold"
                                style="background: linear-gradient(135deg, #6a5af9, #8b7bff);">

                            Change Password

                        </button>

                    </div>

                </form>

            </div>

        </div>

    </div>

</div>

{% endblock %}
