{% load static %}

<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EduPulse: Login to the site</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>

<style>
    body {
        margin: 0;
    }

    .split-container {
        display: flex;
        height: 100vh;
        width: 100%;
    }

    /* LEFT SIDE */
    .left-side {
        width: 50%;
        background: linear-gradient(rgba(0, 0, 0, 0.5), rgba(0, 0, 0, 0.5)),
        url("{% static 'images/background_img.jpg' %}");
        background-size: cover;
        background-position: center;
        position: relative;
    }

    /* RIGHT SIDE */
    .right-side {
        width: 50%;
        background-color: #fff;
        display: flex;
        justify-content: center;
        align-items: center;
    }

    .overlay-content {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        text-align: center;
    }

    .overlay-content h2 {
        margin-bottom: 5px;
        text-align: center;
    }

    .overlay-content p {
        margin-bottom: 25px;
        text-align: center;
        margin-bottom: 40px;
    }

    .avatars {
        display: flex;
        gap: 80px;
        margin-top: 0;
        flex-direction: row;
        align-items: center;
        justify-content: center;
    }

    .avatar {
        text-align: center;
        color: white;
    }

    .avatar img {
        width: 9rem;
        height: 9rem;
        border-radius: 50%;
        background: #f0dda5;
        padding: 10px;
    }

    .avatar a {
        text-decoration: none;
        color: #fff;
    }

    .logo-img {
        width: 120px;
        height: auto;
        margin: 0 auto;
    }
</style>

<body>

    <div class="mb-3 text-center">
        {% if error %}
        <p style="color:red;">{{ error }}</p>
        {% endif %}
    </div>

    <div class="split-container">
        <div class="left-side">

            <div class="overlay-content text-center text-white">
                <h2>Welcome to EduPulse Portal</h2>
                <p>Access your courses and learning resources</p>

                <h5>LOGIN AS</h5>

                <div class="avatars">
                    <div class="avatar">
                        <img src="{% static 'images/student.png' %}">
                        <a href="{%url 'profile_login' %}">Student</a>
                    </div>

                    <div class="avatar">
                        <img src="{% static 'images/teacher.png' %}">
                        <a href="#">Teacher</a>
                    </div>

                    <div class="avatar">
                        <img src="{% static 'images/boss.png' %}">
                        <a href="#">Manager</a>
                    </div>
                </div>
            </div>

        </div>

        <div class="right-side">
            <div class="card shadow-sm p-4 m-4 text-center">
                <img src="{% static 'images/logo.png' %}" alt="EduPulse Logo" class="logo-img mb-3">
                <div class="card-header text-start">
                    <h3>Sign In</h3>
                </div>

                <div class="card-body mt-4">
                    <form action="{% url 'profile_login' %}" method="POST" class="row g-3 needs-validation" novalidate>
                        {% csrf_token %}

                        <div class="mb-3">
                            <input type="text" name="username" placeholder="Username" class="form-control" required
                                autofocus />
                        </div>

                        <div class="mb-3">
                            <input type="password" name="pswd" placeholder="Password" class="form-control">
                        </div>

                        <div class="d-grid mb-3">
                            <button type="submit" class="btn btn-info">Log in</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
</body>

</html>
